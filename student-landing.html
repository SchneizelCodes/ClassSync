<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Class Sync - Landing (Student)</title>
    <link rel="stylesheet" href="student.css" />
  </head>
  <body class="student-landing">
    <header class="student-topbar">
      <div class="brand-mini">
        <span class="brand-mark">S</span>
        <span class="brand-text">Class Sync</span>
      </div>
      <button class="login-pill" type="button" data-action="login-pill">
        <span>Login</span>
        <span class="avatar-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 21c1.8-3.8 5-6 8-6s6.2 2.2 8 6" fill="none" stroke="currentColor" stroke-width="2"></path>
          </svg>
        </span>
      </button>
    </header>

    <section class="welcome-banner">
      <h1>Welcome to Class Sync!</h1>
      <p>Instructor Portal</p>
    </section>

    <main class="landing-main">
      <div class="logo-hero">
        <div class="logo-decor">
          <span class="triangle tri-top"></span>
          <span class="triangle tri-bottom"></span>
        </div>
        <div class="logo-shape">
          <svg viewBox="0 0 220 220" aria-hidden="true">
            <defs>
              <linearGradient id="sGradStudent" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#1f3a88" />
                <stop offset="1" stop-color="#3c5fb8" />
              </linearGradient>
            </defs>
            <path
              d="M120 26c-36 0-66 22-66 50 0 15 10 28 25 34-18 7-30 21-30 38 0 28 30 50 66 50 30 0 55-16 63-38"
              fill="none"
              stroke="url(#sGradStudent)"
              stroke-width="28"
              stroke-linecap="round"
            />
            <circle cx="176" cy="70" r="18" fill="#1a2a3f" opacity="0.85" />
            <circle cx="44" cy="150" r="16" fill="#1a2a3f" opacity="0.6" />
          </svg>
        </div>
        <div class="logo-type">
          <span>Class</span>
          <span>Sync</span>
        </div>
      </div>

      <form class="login-card">
        <label>
          <span>Username / Employee ID</span>
          <input type="text" placeholder="Enter email" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" placeholder="Enter password" />
        </label>
        <button type="button" class="primary-btn" data-action="sign-in">Sign In</button>
        <button type="button" class="link-btn" data-action="forgot-password">Forgot password</button>
      </form>
    </main>
    <script src="student.js"></script>
  </body>
</html>
